spring.application.name=bossbot

# Default profile for local development
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Liquibase configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.drop-first=false
spring.liquibase.default-schema=public

# Common JPA settings (can be overridden in profile-specific files)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# OpenAI Configuration
openai.api-key=${OPENAI_API_KEY:mock}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.max-tokens=${OPENAI_MAX_TOKENS:1024}
openai.temperature=${OPENAI_TEMPERATURE:0.7}

# Chat Configuration
chat.max-message-length=${CHAT_MAX_MESSAGE_LENGTH:150}
chat.max-history-messages=${CHAT_MAX_HISTORY_MESSAGES:20}
chat.system-prompt=${CHAT_SYSTEM_PROMPT:You are BossBot, a helpful AI assistant for company leaders and managers. You answer technical questions concisely and professionally. Keep responses clear and to the point.}

# Liquibase logging (set to DEBUG for troubleshooting)
logging.level.liquibase=INFO

