spring.application.name=bossbot

# Default profile for local development
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Liquibase configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.drop-first=false
spring.liquibase.default-schema=public

# Common JPA settings (can be overridden in profile-specific files)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Liquibase logging (set to DEBUG for troubleshooting)
logging.level.liquibase=INFO

# Liquibase debug logging
# logging.level.liquibase=DEBUG
# logging.level.liquibase.lockservice=DEBUG
# logging.level.liquibase.changelog=DEBUG
