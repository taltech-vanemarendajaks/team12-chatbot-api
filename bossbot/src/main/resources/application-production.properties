# Production profile - for deploying to production server
# Use this profile whether deploying:
#  - As a JAR directly on server
#  - In a Docker container to production
# Set SPRING_PROFILES_ACTIVE=production when deploying

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA Configuration for production
spring.jpa.hibernate.ddl-auto=validate
# No SQL logging (performance)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Connection pooling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Liquibase in production
spring.liquibase.enabled=true
# Only run migrations without context or with 'production' context (excludes test data)
spring.liquibase.contexts=production

# Disable API docs in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.example.bossbot=INFO
logging.level.liquibase=INFO
